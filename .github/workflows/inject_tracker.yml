name: Inject Tracker

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject tracker.js into ALL HTML files
        run: |
          python3 << 'PYEOF'
          import os, re, glob

          TRACKER_LINE = '  <script src="tracker.js"></script>\n'
          patched = 0
          skipped = 0
          already = 0

          # Get ALL html files in root directory
          html_files = glob.glob('*.html')

          # Exclude teacher-only and non-assessment pages
          EXCLUDE = {
            'teacher-admin.html', 'teacher-admin (2).html',
            'lock-manager.html', 'lockbar.html', 'lockbar-v2.html',
            'contact.html', 'downloads.html', 'videos.html',
            'periodic-table.html', 'lesson-plan.html',
            'manifest.json'
          }

          for fname in sorted(html_files):
            if fname in EXCLUDE:
              print(f"  EXCLUDED: {fname}")
              skipped += 1
              continue

            try:
              with open(fname, 'r', encoding='utf-8', errors='replace') as f:
                content = f.read()
            except:
              print(f"  READ ERROR: {fname}")
              skipped += 1
              continue

            # Already patched?
            if 'tracker.js' in content:
              print(f"  ALREADY: {fname}")
              already += 1
              continue

            # Remove any old inline tracker block
            content = re.sub(
              r'\n?<!-- ═══ Student Tracking System ═══ -->.*?<!-- ═══ End Tracking System ═══ -->\n?',
              '', content, flags=re.DOTALL
            )

            # Inject before </head>
            if '</head>' in content:
              content = content.replace('</head>', TRACKER_LINE + '</head>', 1)
              with open(fname, 'w', encoding='utf-8') as f:
                f.write(content)
              print(f"  PATCHED: {fname}")
              patched += 1
            else:
              print(f"  NO HEAD TAG: {fname}")
              skipped += 1

          print(f"\nDone: {patched} newly patched | {already} already had tracker | {skipped} skipped/excluded")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: inject tracker.js into all remaining HTML pages"
          git push
