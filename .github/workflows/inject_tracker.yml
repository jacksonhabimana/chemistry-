name: Inject Tracker

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Remove tracker from ALL pages first (clean slate)
        run: |
          python3 << 'PYEOF'
          import os, glob
          removed = 0
          for fname in glob.glob('*.html'):
            with open(fname,'r',encoding='utf-8',errors='replace') as f:
              content = f.read()
            if 'tracker.js' in content:
              content = content.replace('  <script src="tracker.js"></script>\n','')
              content = content.replace('<script src="tracker.js"></script>\n','')
              content = content.replace('<script src="tracker.js"></script>','')
              with open(fname,'w',encoding='utf-8') as f:
                f.write(content)
              print(f"  Cleaned: {fname}")
              removed += 1
          print(f"Removed from {removed} files")
          PYEOF

      - name: Add tracker ONLY to quiz/test/exam pages
        run: |
          python3 << 'PYEOF'
          import os, re

          TRACKER_LINE = '  <script src="tracker.js"></script>\n'

          # ONLY these pages get the tracker gate
          TARGETS = [
            "exams.html",
            "quizzes.html",
            "tests.html",
            "quiz-hub.html",
            "student-exam.html",
            "student-exam (2).html",
            "student-quiz.html",
            "student-paper-exam.html",
          ]

          patched = 0
          for fname in TARGETS:
            if not os.path.exists(fname):
              print(f"  NOT FOUND: {fname}")
              continue
            with open(fname,'r',encoding='utf-8',errors='replace') as f:
              content = f.read()
            if 'tracker.js' in content:
              print(f"  ALREADY: {fname}")
              continue
            if '</head>' in content:
              content = content.replace('</head>', TRACKER_LINE + '</head>', 1)
              with open(fname,'w',encoding='utf-8') as f:
                f.write(content)
              print(f"  PATCHED: {fname}")
              patched += 1

          print(f"\nDone: {patched} assessment pages patched")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix: tracker only on quiz/test/exam pages"
          git push
